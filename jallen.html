<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Jallen Racing</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(270deg, #020617, #0f172a, #020617);
      background-size: 600% 600%;
      animation: gradientAnimation 15s ease infinite;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    @keyframes gradientAnimation {
      0% {background-position: 0% 50%;}
      50% {background-position: 100% 50%;}
      100% {background-position: 0% 50%;}
    }

    /* Menu bar */
    nav {
      width: 100%;
      background: rgba(0,0,0,0.5);
      display: flex;
      justify-content: center;
      padding: 15px 0;
      margin-bottom: 50px;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin: 0 30px;
      font-size: 18px;
      transition: 0.3s;
    }

    nav a:hover {
      color: #00bfff;
      text-shadow: 0 0 10px #00bfff, 0 0 20px #00bfff;
    }

    h1 {
      font-size: 50px;
      color: #00bfff;
      text-shadow: 0 0 10px #00bfff, 0 0 20px #00bfff;
      margin-bottom: 20px;
      text-align: center;
    }

    p {
      font-size: 28px;
      color: #00bfff;
      text-shadow: 0 0 8px #00bfff, 0 0 15px #00bfff;
      text-align: center;
    }

  </style>
</head>
<body>

  <!-- Menu Bar -->
  <nav>
    <a href="index.html">Blud Timer</a>
    <a href="milestones.html">Milestones</a>
    <a href="jallen.html">Jallen Racing</a>
  </nav>

  <h1>🏎️ Jallen Racing</h1>
  <p>Still in progress…</p>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>Ziddianthe Blud Timer</title>
  <style>
    body {
      background: #020617;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      padding-top: 100px;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 40px;
    }

    #timer {
      font-size: 30px;
      background: #0f172a;
      display: inline-block;
      padding: 20px 40px;
      border-radius: 15px;
    }
  </style>
</head>
<body>

  <h1>⏱ Ziddianthe Blud Timer</h1>

  <div id="timer">Loading...</div>

  <script>
    // START DATE: Jan 30, 2026
const startDate = new Date("2026-01-31T17:43:00");
    
    function updateTimer() {
      const now = new Date();
      const diff = now - startDate;

      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
      const minutes = Math.floor((diff / (1000 * 60)) % 60);
      const seconds = Math.floor((diff / 1000) % 60);

      document.getElementById("timer").innerHTML =
        days + " days " +
        hours + " hours " +
        minutes + " minutes " +
        seconds + " seconds";
    }

    setInterval(updateTimer, 1000);
    updateTimer();
  </script>

</body>
</html>

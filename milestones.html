<!DOCTYPE html>
<html>
<head>
  <title>Milestones - Ziddianthe Blud Timer</title>
  <style>
    body {
      margin:0;
      padding:0;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: linear-gradient(270deg, #020617, #0f172a, #020617);
      background-size: 600% 600%;
      animation: gradientAnimation 15s ease infinite;
      color:#fff;
      min-height:100vh;
    }
    @keyframes gradientAnimation {
      0%{background-position:0% 50%;}
      50%{background-position:100% 50%;}
      100%{background-position:0% 50%;}
    }
    nav {margin:20px 0;}
    nav a {color:#ff4d6d; text-decoration:none; margin:0 15px; font-weight:bold; text-shadow:0 0 5px #ff4d6d;}
    nav a:hover{text-shadow:0 0 15px #ff4d6d;}
    h1 {font-size:50px; color:#ff4d6d; text-shadow:0 0 10px #ff4d6d,0 0 20px #ff4d6d; margin-bottom:30px; animation:glow 2s infinite alternate;}
    @keyframes glow{from{text-shadow:0 0 5px #ff4d6d,0 0 10px #ff4d6d;} to{text-shadow:0 0 20px #ff4d6d,0 0 40px #ff4d6d;}}
    .milestone {
      font-size:30px;
      background: rgba(15,23,42,0.7);
      padding: 20px 40px;
      border-radius:15px;
      margin:10px 0;
      box-shadow:0 0 20px #ff4d6d,0 0 40px #ff4d6d;
      width: 300px;
      text-align:center;
    }
    .done {text-decoration:line-through; opacity:0.6;}
  </style>
</head>
<body>
  <nav>
    <a href="index.html">Blud Timer</a> | 
    <a href="milestones.html">Milestones</a> | 
    <a href="jallen.html">Jallen Racing</a>
  </nav>

  <h1>Milestones</h1>

  <div id="milestones"></div>

  <script>
    const startDate = new Date("2025-03-26T00:00:00");
    const today = new Date();
    const anniversaryDate = startDate; // anniversary = start date last year
    const milestonesDays = [50,100,200,300];
    
    function updateMilestones() {
      const now = new Date();
      const diffDays = Math.floor((now-startDate)/(1000*60*60*24));
      const container = document.getElementById("milestones");
      container.innerHTML = "";
      milestonesDays.forEach(daysTarget=>{
        const div = document.createElement("div");
        div.classList.add("milestone");
        if(diffDays >= daysTarget) div.classList.add("done");
        const daysLeft = daysTarget - diffDays;
        div.innerHTML = daysTarget + " days " + (daysLeft>0 ? "remaining: " + daysLeft : "✅ Completed!");
        container.appendChild(div);
      });

      // Anniversary
      const diffAnn = Math.ceil((anniversaryDate - now)/(1000*60*60*24));
      const divAnn = document.createElement("div");
      divAnn.classList.add("milestone");
      divAnn.innerHTML = "Anniversary " + (diffAnn>0 ? "in " + diffAnn + " days" : "🎉 Today!");
      container.appendChild(divAnn);
    }

    setInterval(updateMilestones, 1000*60*60); // update hourly
    updateMilestones();
  </script>

</body>
</html>
